<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RotaFlow — Central de Logística</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0B0F17;
  --bg-2:#0E131C;
  --surface:#151B27;
  --surface-2:#1A2231;
  --surface-3:#212B3D;
  --line:#26314599;
  --line-solid:#283042;
  --txt:#E7EBF2;
  --txt-2:#9AA4B8;
  --txt-3:#5F6B82;
  --amber:#F59E0B;
  --amber-2:#FB923C;
  --cyan:#38BDF8;
  --green:#22C55E;
  --red:#F0524D;
  --violet:#8B7BF7;
  --radius:16px;
  --radius-sm:11px;
  --shadow:0 18px 40px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 88% -10%, rgba(245,158,11,.10), transparent 60%),
    radial-gradient(900px 500px at -5% 100%, rgba(56,189,248,.08), transparent 55%),
    var(--bg);
  color:var(--txt);
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#2a3548;border-radius:20px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}
h1,h2,h3,h4,.font-d{font-family:'Sora',sans-serif}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

/* ---------- LAYOUT ---------- */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{
  background:linear-gradient(180deg,var(--bg-2),#0a0e16);
  border-right:1px solid var(--line);
  padding:22px 16px;display:flex;flex-direction:column;gap:6px;
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 20px}
.logo{
  width:40px;height:40px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--amber),var(--amber-2));
  display:grid;place-items:center;box-shadow:0 8px 18px -6px rgba(245,158,11,.5);
  position:relative;overflow:hidden;
}
.logo svg{width:22px;height:22px}
.brand-txt b{font-family:'Sora';font-weight:800;font-size:16px;letter-spacing:-.3px;display:block;line-height:1.1}
.brand-txt span{font-size:10.5px;color:var(--txt-3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.nav-label{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--txt-3);font-weight:700;padding:14px 10px 6px}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:11px;
  color:var(--txt-2);font-weight:500;font-size:14px;cursor:pointer;border:1px solid transparent;
  transition:.15s;user-select:none;
}
.nav-item svg{width:18px;height:18px;stroke-width:1.9;flex-shrink:0}
.nav-item:hover{background:var(--surface);color:var(--txt)}
.nav-item.active{
  background:linear-gradient(135deg,rgba(245,158,11,.16),rgba(251,146,60,.06));
  color:#FFD89B;border-color:rgba(245,158,11,.28);
}
.nav-item.active svg{color:var(--amber)}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10.5px;font-weight:700;
  min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 5px}
.sidebar-foot{margin-top:auto;font-size:11px;color:var(--txt-3);padding:14px 10px 2px;border-top:1px solid var(--line);line-height:1.6}

.main{padding:26px 30px 60px;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:26px;flex-wrap:wrap}
.page-title{font-size:24px;font-weight:800;letter-spacing:-.6px}
.page-sub{color:var(--txt-2);font-size:13.5px;margin-top:3px}
.live{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;color:var(--green);font-weight:600;
  background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);padding:6px 12px;border-radius:20px}
.live .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 1.8s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.55)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

/* ---------- BUTTONS / INPUTS ---------- */
.btn{
  display:inline-flex;align-items:center;gap:8px;font-family:'Inter';font-weight:600;font-size:13.5px;
  padding:10px 16px;border-radius:11px;border:1px solid var(--line-solid);background:var(--surface-2);
  color:var(--txt);cursor:pointer;transition:.15s;white-space:nowrap;
}
.btn svg{width:16px;height:16px;stroke-width:2}
.btn:hover{background:var(--surface-3);border-color:#36425a}
.btn-primary{background:linear-gradient(135deg,var(--amber),var(--amber-2));border:none;color:#1a1206;font-weight:700;
  box-shadow:0 8px 20px -8px rgba(245,158,11,.55)}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--txt-2);padding:8px 10px}
.btn-ghost:hover{background:var(--surface);color:var(--txt)}
.btn-sm{padding:7px 11px;font-size:12.5px;border-radius:9px}
.btn-danger:hover{background:rgba(240,82,77,.14);border-color:rgba(240,82,77,.4);color:#ff8a86}
input,select,textarea{
  font-family:'Inter';font-size:14px;color:var(--txt);background:var(--bg-2);
  border:1px solid var(--line-solid);border-radius:10px;padding:11px 13px;width:100%;transition:.15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.13)}
input::placeholder{color:var(--txt-3)}
label{display:block;font-size:12px;font-weight:600;color:var(--txt-2);margin-bottom:7px}
select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%239AA4B8' stroke-width='2.2'><path d='M3 5l4 4 4-4'/></svg>");background-repeat:no-repeat;background-position:right 13px center;padding-right:34px}

/* ---------- CARDS ---------- */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:22px}
.kpi{padding:18px 20px;position:relative;overflow:hidden}
.kpi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.kpi-ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center}
.kpi-ico svg{width:20px;height:20px;stroke-width:2}
.kpi-tag{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.kpi-val{font-family:'Sora';font-weight:800;font-size:28px;letter-spacing:-1px;line-height:1}
.kpi-lbl{color:var(--txt-2);font-size:12.5px;margin-top:7px;font-weight:500}
.kpi-sub{font-size:11.5px;color:var(--txt-3);margin-top:6px}

.panel{padding:20px 22px}
.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.panel-head h3{font-size:16px;font-weight:700;letter-spacing:-.3px}
.panel-head .sub{font-size:12px;color:var(--txt-3);margin-top:2px}

/* ---------- TABLE ---------- */
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--line)}
table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:560px}
thead th{
  text-align:left;font-weight:600;font-size:11px;letter-spacing:.6px;text-transform:uppercase;
  color:var(--txt-3);padding:13px 16px;background:var(--bg-2);border-bottom:1px solid var(--line);white-space:nowrap}
tbody td{padding:13px 16px;border-bottom:1px solid var(--line);color:var(--txt);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:.12s}
tbody tr:hover{background:var(--surface-2)}
.t-strong{font-weight:600}
.t-mut{color:var(--txt-2);font-size:12.5px}
.row-actions{display:flex;gap:4px;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid transparent;background:transparent;cursor:pointer;
  display:grid;place-items:center;color:var(--txt-3);transition:.12s}
.icon-btn svg{width:15px;height:15px;stroke-width:2}
.icon-btn:hover{background:var(--surface-3);color:var(--txt)}
.icon-btn.del:hover{color:#ff8a86;background:rgba(240,82,77,.12)}

/* ---------- BADGES ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
.badge .bd{width:6px;height:6px;border-radius:50%}
.b-green{background:rgba(34,197,94,.13);color:#5ee08f}.b-green .bd{background:var(--green)}
.b-amber{background:rgba(245,158,11,.14);color:#ffc764}.b-amber .bd{background:var(--amber)}
.b-red{background:rgba(240,82,77,.14);color:#ff8a86}.b-red .bd{background:var(--red)}
.b-cyan{background:rgba(56,189,248,.13);color:#7dd3fc}.b-cyan .bd{background:var(--cyan)}
.b-violet{background:rgba(139,123,247,.15);color:#b8aefb}.b-violet .bd{background:var(--violet)}
.b-gray{background:#212b3d;color:var(--txt-2)}.b-gray .bd{background:var(--txt-3)}

/* ---------- FILTER BAR ---------- */
.filterbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.filterbar input,.filterbar select{width:auto;min-width:150px;flex:0 0 auto}
.search{flex:1 1 200px;min-width:180px;position:relative}
.search input{padding-left:38px;width:100%}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--txt-3)}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(5,8,13,.72);backdrop-filter:blur(4px);z-index:100;
  display:none;align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--line-solid);border-radius:18px;width:100%;max-width:580px;
  box-shadow:0 30px 70px -20px rgba(0,0,0,.8);animation:pop .2s ease}
@keyframes pop{from{transform:translateY(14px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:17px;font-weight:700}
.modal-body{padding:22px 24px}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:1px solid var(--line)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.form-grid .full{grid-column:1/-1}

/* ---------- MISC ---------- */
.grid-2{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;margin-bottom:18px}
.chart-box{position:relative;height:260px}
.chart-box.sm{height:220px}
.empty{text-align:center;padding:48px 20px;color:var(--txt-3)}
.empty svg{width:44px;height:44px;margin-bottom:14px;opacity:.5}
.empty b{display:block;color:var(--txt-2);font-size:15px;margin-bottom:5px;font-family:'Sora'}
.alert-item{display:flex;gap:13px;padding:13px 14px;border-radius:12px;background:var(--bg-2);border:1px solid var(--line);margin-bottom:10px;align-items:center}
.alert-item:last-child{margin-bottom:0}
.alert-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.alert-ico svg{width:17px;height:17px;stroke-width:2}
.alert-txt b{font-size:13.5px;font-weight:600;display:block}
.alert-txt span{font-size:12px;color:var(--txt-2)}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:13px}
.bar-row .lbl{width:120px;font-size:12.5px;color:var(--txt-2);flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--bg-2);border-radius:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:8px;transition:width .5s ease}
.bar-row .val{width:90px;text-align:right;font-size:12.5px;font-weight:600}
.hint{font-size:12px;color:var(--txt-3);margin-top:6px}
.page{display:none}.page.active{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface-2);border:1px solid var(--line-solid);border-left:3px solid var(--green);
  padding:13px 18px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:var(--shadow);
  display:flex;align-items:center;gap:10px;animation:slidein .25s ease;min-width:240px}
.toast svg{width:18px;height:18px;color:var(--green);flex-shrink:0}
@keyframes slidein{from{transform:translateX(30px);opacity:0}to{transform:none;opacity:1}}
.mini-stat{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.mini-stat:last-child{border:none}
.mini-stat span{color:var(--txt-2)}.mini-stat b{font-weight:600}
.menu-toggle{display:none}

@media(max-width:980px){.grid-2{grid-template-columns:1fr}}
@media(max-width:820px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;z-index:90;width:260px;transform:translateX(-100%);transition:.25s}
  .sidebar.open{transform:none}
  .menu-toggle{display:grid}
  .main{padding:18px 16px 50px}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1206" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 3h15v13H1z"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
        </svg>
      </div>
      <div class="brand-txt">
        <b>RotaFlow</b>
        <span>Logística</span>
      </div>
    </div>

    <div class="nav-label">Operação</div>
    <div class="nav-item active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      <span>Painel</span>
    </div>
    <div class="nav-item" data-page="escalas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Escalas</span>
    </div>
    <div class="nav-item" data-page="frota">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 17h-4M5 17H3V5h11v12h-2"/><path d="M14 9h4l3 3v5h-3"/><circle cx="7.5" cy="17.5" r="2"/><circle cx="16.5" cy="17.5" r="2"/></svg>
      <span>Frota & Manutenção</span>
      <span class="nav-badge" id="badge-frota" style="display:none">0</span>
    </div>
    <div class="nav-item" data-page="combustivel">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V4a2 2 0 0 1 2-2h7a2 2 0 0 1 2 2v18"/><path d="M3 13h11"/><path d="M14 8h3l3 3v7a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-3"/></svg>
      <span>Combustível & Custos</span>
    </div>
    <div class="nav-item" data-page="equipe">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Equipe</span>
      <span class="nav-badge" id="badge-equipe" style="display:none">0</span>
    </div>

    <div class="sidebar-foot">
      <div id="company-name" style="color:var(--txt-2);font-weight:600;margin-bottom:3px">SLZ Cargas</div>
      São Luís — MA · Encarregado de Logística
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="exportData()" title="Backup dos dados">⤓ Backup</button>
        <button class="btn btn-ghost btn-sm" onclick="importData()" title="Restaurar backup">⤒ Restaurar</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-ghost menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <div>
          <div class="page-title" id="pageTitle">Painel</div>
          <div class="page-sub" id="pageSub">Visão geral da operação em tempo real</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="live"><span class="dot"></span> Atualizado em tempo real</span>
        <button class="btn btn-primary" id="mainAddBtn" onclick="openMainAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>
          <span id="mainAddLabel">Novo</span>
        </button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <section class="page active" id="page-dashboard"></section>
    <!-- ESCALAS -->
    <section class="page" id="page-escalas"></section>
    <!-- FROTA -->
    <section class="page" id="page-frota"></section>
    <!-- COMBUSTIVEL -->
    <section class="page" id="page-combustivel"></section>
    <!-- EQUIPE -->
    <section class="page" id="page-equipe"></section>
  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Novo</h3>
      <button class="icon-btn" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalSave">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>
<input type="file" id="importFile" accept=".json" style="display:none">

<script>
/* ===================================================================
   ROTAFLOW — CENTRAL DE LOGÍSTICA
   Estado + persistência em localStorage
=================================================================== */
const LS_KEY = 'rotaflow_v1';
const fmtBRL = v => 'R$ ' + (Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtNum = (v,d=0) => (Number(v)||0).toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtDate = s => { if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; };
const uid = () => Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayISO = () => new Date().toISOString().slice(0,10);
const daysUntil = s => { if(!s) return null; return Math.ceil((new Date(s)-new Date(todayISO()))/86400000); };

let DB = load();

function load(){
  try{ const r = localStorage.getItem(LS_KEY); if(r) return JSON.parse(r); }catch(e){}
  return seed();
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }catch(e){ console.warn('save fail',e); } }

/* ---------- SEED (dados de exemplo de uma transportadora) ---------- */
function seed(){
  return {
    company:'SLZ Cargas',
    motoristas:[
      {id:'m1',nome:'Carlos Ferreira',cnh:'04587712399',cat:'E',validade:'2026-07-10',tel:'(98) 98114-2030',admissao:'2021-03-01',status:'Ativo'},
      {id:'m2',nome:'José Antônio Lima',cnh:'03992014511',cat:'D',validade:'2027-02-22',tel:'(98) 99220-5587',admissao:'2022-08-15',status:'Ativo'},

const veiculoById = id => DB.veiculos.find(v=>v.id===id);
const motoristaById = id => DB.motoristas.find(m=>m.id===id);
const placa = id => { const v=veiculoById(id); return v?v.placa:'—'; };

const motNome = id => { const m=motoristaById(id); return m?m.nome:'—'; };

// consumo km/L por veículo: usa diferença de km entre abastecimentos consecutivos
function consumoVeiculo(vid){
  const abs = DB.abastecimentos.filter(a=>a.veiculo===vid).sort((a,b)=>a.km-b.km);
  if(abs.length<2) return null;
  let kmTotal=0, litros=0;
  for(let i=1;i<abs.length;i++){
    const dk = abs[i].km - abs[i-1].km;
    if(dk>0){ kmTotal+=dk; litros+=abs[i].litros; }
  }
  return litros>0 ? kmTotal/litros : null;
}
function consumoMedioFrota(){
  const vals = DB.veiculos.map(v=>consumoVeiculo(v.id)).filter(x=>x!=null);
  if(!vals.length) return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
function inMonth(iso){ if(!iso) return false; const now=new Date(); return iso.slice(0,7)===now.toISOString().slice(0,7); }

function gastoCombustivelMes(){
  return DB.abastecimentos.filter(a=>inMonth(a.data)).reduce((s,a)=>s + a.litros*a.valorL,0);
}
function custoOperacionalMes(){
  const out = DB.custos.filter(c=>inMonth(c.data)).reduce((s,c)=>s+Number(c.valor),0);
  const man = DB.manutencoes.filter(m=>inMonth(m.data)).reduce((s,m)=>s+Number(m.custo),0);
  return out+man;
}
function custoTotalMes(){ return gastoCombustivelMes()+custoOperacionalMes(); }

// alertas em tempo real
function getAlertas(){
  const al=[];
  // CNH vencendo
  DB.motoristas.forEach(m=>{
    const d=daysUntil(m.validade);
    if(d!=null && d<=30){
      al.push({tipo:d<0?'crit':'warn',cat:'CNH',titulo:`CNH de ${m.nome} ${d<0?'vencida':'vence em '+d+' dias'}`,sub:`Categoria ${m.cat} · ${fmtDate(m.validade)}`});
    }
  });
  // manutenção preventiva por km
  DB.veiculos.forEach(v=>{
    if(v.proxRevisaoKm){
      const falta=v.proxRevisaoKm - v.km;
      if(falta<=2000){
        al.push({tipo:falta<=0?'crit':'warn',cat:'Manutenção',titulo:`${v.placa} ${falta<=0?'com revisão atrasada':'próx. revisão em '+fmtNum(falta)+' km'}`,sub:`${v.modelo} · ${fmtNum(v.km)} km`});
      }
    }
    if(v.status==='Manutenção'){
      al.push({tipo:'info',cat:'Frota',titulo:`${v.placa} em manutenção`,sub:v.modelo});
    }
  });
  return al;
}
function countAlertasFrota(){
  return DB.veiculos.filter(v=>v.status==='Manutenção' || (v.proxRevisaoKm && v.proxRevisaoKm-v.km<=2000)).length;
}
function countAlertasEquipe(){
  return DB.motoristas.filter(m=>{const d=daysUntil(m.validade); return d!=null && d<=30;}).length;
}

function renderConsumoBars(){
  const rows=DB.veiculos.map(v=>({v,c:consumoVeiculo(v.id)})).filter(r=>r.c!=null).sort((a,b)=>b.c-a.c);
  if(!rows.length) return `<div class="empty" style="padding:24px"><b>Sem dados</b>Lance ao menos 2 abastecimentos por veículo</div>`;
  const max=Math.max(...rows.map(r=>r.c),1);
  return rows.map(r=>{
    const pct=(r.c/max)*100;
    const col=r.c>=3?'#22C55E':r.c>=2?'#F59E0B':'#F0524D';

    <div class="panel-head"><div><h3>Frota</h3><div class="sub">${DB.veiculos.filter(v=>v.status==='Ativo').length} ativos · ${DB.veiculos.filter(v=>v.status==='Manutenção').length} em manutenção</div></div></div>
    ${DB.veiculos.length?`<div class="tbl-wrap"><table><thead><tr><th>Placa</th><th>Modelo</th><th>Tipo</th><th>Ano</th><th>KM atual</th><th>Próx. revisão</th><th>Status</th><th></th></tr></thead><tbody>
      ${DB.veiculos.map(v=>{
        const falta=v.proxRevisaoKm?v.proxRevisaoKm-v.km:null;
        const revBadge=falta==null?'<span class="t-mut">—</span>':falta<=0?badge('Atrasada','red'):falta<=2000?badge(fmtNum(falta)+' km','amber'):`<span class="mono t-mut">${fmtNum(v.proxRevisaoKm)} km</span>`;
        return `<tr>
          <td class="t-strong mono">${v.placa}</td>
          <td>${v.modelo}</td>
          <td class="t-mut">${v.tipo}</td>
          <td class="t-mut">${v.ano}</td>
          <td class="mono">${fmtNum(v.km)} km</td>
          <td>${revBadge}</td>
          <td>${badge(v.status,statusVeic(v.status))}</td>
          <td><div class="row-actions">
            <button class="icon-btn" onclick="modalVeiculo('${v.id}')" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="icon-btn del" onclick="del('veiculos','${v.id}')" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
          </div></td></tr>`;}).join('')}
    </tbody></table></div>`:emptyState('Nenhum veículo cadastrado','Cadastre o primeiro veículo da frota')}
  </div>`;
}

  return `<div class="card panel">
    <div class="panel-head"><div><h3>Manutenções</h3><div class="sub">Gasto no mês: ${fmtBRL(totalMes)} · ${DB.manutencoes.filter(m=>m.status!=='Concluída').length} em aberto</div></div></div>

      ${list.map(m=>`<tr>
        <td class="mono t-mut">${fmtDate(m.data)}</td>
        <td class="t-strong">${placa(m.veiculo)}</td>
        <td>${badge(m.tipo,m.tipo==='Preventiva'?'cyan':'amber')}</td>
        <td>${m.desc}</td>
        <td class="mono t-mut">${m.km?fmtNum(m.km):'—'}</td>
        <td class="mono t-strong">${fmtBRL(m.custo)}</td>
        <td>${badge(m.status,statusMan(m.status))}</td>
        <td><div class="row-actions">
          <button class="icon-btn" onclick="modalManutencao('${m.id}')" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
          <button class="icon-btn del" onclick="del('manutencoes','${m.id}')" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>

/* ---------- COMBUSTÍVEL & CUSTOS ---------- */
let fCombTab='abastecimentos';
function renderCombustivel(){
  const el=document.getElementById('page-combustivel');
  const gastoComb=gastoCombustivelMes();
  const litrosMes=DB.abastecimentos.filter(a=>inMonth(a.data)).reduce((s,a)=>s+a.litros,0);
  const opMes=DB.custos.filter(c=>inMonth(c.data)).reduce((s,c)=>s+Number(c.valor),0);
  const precoMedio=litrosMes?gastoComb/litrosMes:0;
  el.innerHTML=`
  <div class="kpi-grid">
    ${kpiCard(ic.fuel,'#22C55E',fmtBRL(gastoComb),'Combustível no mês',`${fmtNum(litrosMes)} L abastecidos`)}
    ${kpiCard(ic.gauge,'#F59E0B','R$ '+fmtNum(precoMedio,2)+'/L','Preço médio do litro','Diesel S10')}
    ${kpiCard(ic.cash,'#38BDF8',fmtBRL(opMes),'Outros custos no mês','Pedágio, multas, pneus...')}
    ${kpiCard(ic.route,'#8B7BF7',consumoMedioFrota()?fmtNum(consumoMedioFrota(),1)+' km/L':'—','Consumo médio','Média da frota')}
  </div>
  <div class="filterbar">
    <button class="btn ${fCombTab==='abastecimentos'?'btn-primary':''}" onclick="fCombTab='abastecimentos';renderCombustivel()">Abastecimentos (${DB.abastecimentos.length})</button>
    <button class="btn ${fCombTab==='custos'?'btn-primary':''}" onclick="fCombTab='custos';renderCombustivel()">Custos operacionais (${DB.custos.length})</button>
    <div style="flex:1"></div>
    ${fCombTab==='abastecimentos'
      ?`<button class="btn btn-primary" onclick="modalAbastecimento()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg> Abastecimento</button>`
      :`<button class="btn btn-primary" onclick="modalCusto()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg> Novo custo</button>`}
  </div>
  ${fCombTab==='abastecimentos'?renderAbastecimentos():renderCustos()}`;
}

/* ---------- EQUIPE ---------- */
let fEquipe={busca:'',status:''};
function renderEquipe(){
  let list=[...DB.motoristas];
  if(fEquipe.busca){const q=fEquipe.busca.toLowerCase();list=list.filter(m=>m.nome.toLowerCase().includes(q)||m.cnh.includes(q)||(m.tel||'').includes(q));}
  if(fEquipe.status)list=list.filter(m=>m.status===fEquipe.status);
  const el=document.getElementById('page-equipe');
  el.innerHTML=`
  <div class="filterbar">
    <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Buscar nome, CNH ou telefone..." value="${fEquipe.busca}" oninput="fEquipe.busca=this.value;renderEquipe()"></div>
    <select onchange="fEquipe.status=this.value;renderEquipe()"><option value="">Todos</option>${['Ativo','Folga','Afastado','Inativo'].map(s=>`<option ${fEquipe.status===s?'selected':''}>${s}</option>`).join('')}</select>
    <button class="btn btn-primary" onclick="modalMotorista()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg> Novo motorista</button>
  </div>
  <div class="card panel">
    <div class="panel-head"><div><h3>Motoristas (${list.length})</h3><div class="sub">${DB.motoristas.filter(m=>m.status==='Ativo').length} ativos · ${countAlertasEquipe()} com CNH a vencer</div></div></div>
    ${list.length?`<div class="tbl-wrap"><table><thead><tr><th>Nome</th><th>CNH</th><th>Cat.</th><th>Validade CNH</th><th>Telefone</th><th>Admissão</th><th>Status</th><th></th></tr></thead><tbody>
      ${list.map(m=>{
        const d=daysUntil(m.validade);
        const valBadge=d==null?fmtDate(m.validade):d<0?badge('Vencida '+fmtDate(m.validade),'red'):d<=30?badge(`${d}d · ${fmtDate(m.validade)}`,'amber'):`<span class="mono t-mut">${fmtDate(m.validade)}</span>`;
        return `<tr>
          <td class="t-strong">${m.nome}</td>
          <td class="mono t-mut">${m.cnh}</td>
          <td>${badge('Cat '+m.cat,'violet')}</td>
          <td>${valBadge}</td>
          <td class="t-mut">${m.tel||'—'}</td>
          <td class="mono t-mut">${fmtDate(m.admissao)}</td>
          <td>${badge(m.status,statusMot(m.status))}</td>
          <td><div class="row-actions">
            <button class="icon-btn" onclick="modalMotorista('${m.id}')" title="Editar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
            <button class="icon-btn del" onclick="del('motoristas','${m.id}')" title="Excluir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg></button>
          </div></td></tr>`;}).join('')}
    </tbody></table></div>`:emptyState('Nenhum motorista','Cadastre os motoristas da equipe')}
  </div>`;
}

function emptyState(t,s){
  return `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h3"/></svg><b>${t}</b>${s}</div>`;
}

/* ===================================================================
   MODAIS / FORMULÁRIOS
=================================================================== */
let modalCtx={};
function openModal(title,body,onSave){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modalSave').onclick=onSave;
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
const val=id=>document.getElementById(id).value.trim();
const numv=id=>parseFloat(document.getElementById(id).value)||0;

function optVeic(sel){return DB.veiculos.map(v=>`<option value="${v.id}" ${sel===v.id?'selected':''}>${v.placa} · ${v.modelo}</option>`).join('');}
function optMot(sel){return DB.motoristas.map(m=>`<option value="${m.id}" ${sel===m.id?'selected':''}>${m.nome}</option>`).join('');}
function optSel(arr,sel){return arr.map(o=>`<option ${sel===o?'selected':''}>${o}</option>`).join('');}

/* --- Escala --- */
function modalEscala(id){
  const e=id?DB.escalas.find(x=>x.id===id):{data:todayISO(),turno:'Manhã',status:'Planejada'};
  openModal(id?'Editar escala':'Nova escala',`
    <div class="form-grid">
      <div><label>Data</label><input type="date" id="f_data" value="${e.data||todayISO()}"></div>
      <div><label>Turno</label><select id="f_turno">${optSel(['Madrugada','Manhã','Tarde','Noite'],e.turno)}</select></div>
      <div><label>Motorista</label><select id="f_mot">${optMot(e.motorista)}</select></div>
      <div><label>Veículo</label><select id="f_veic">${optVeic(e.veiculo)}</select></div>
      <div class="full"><label>Rota / Destino</label><input id="f_rota" placeholder="Ex: São Luís → Imperatriz" value="${e.rota||''}"></div>
      <div class="full"><label>Status</label><select id="f_status">${optSel(['Planejada','Em rota','Concluída','Cancelada'],e.status)}</select></div>
    </div>`,()=>{
      const obj={id:e.id||uid(),data:val('f_data'),turno:val('f_turno'),motorista:val('f_mot'),veiculo:val('f_veic'),rota:val('f_rota'),status:val('f_status')};
      if(!obj.rota){toast('Informe a rota/destino','red');return;}
      upsert('escalas',obj);closeModal();toast(id?'Escala atualizada':'Escala criada');
    });
}
/* --- Veículo --- */
function modalVeiculo(id){
  const v=id?DB.veiculos.find(x=>x.id===id):{tipo:'Truck',status:'Ativo',ano:'2020'};
  openModal(id?'Editar veículo':'Novo veículo',`
    <div class="form-grid">
      <div><label>Placa</label><input id="f_placa" placeholder="RKZ-1A23" value="${v.placa||''}"></div>
      <div><label>Tipo</label><select id="f_tipo">${optSel(['Toco','Truck','Carreta','Bitrem','VUC','Van'],v.tipo)}</select></div>
      <div class="full"><label>Modelo</label><input id="f_modelo" placeholder="Mercedes-Benz Atego 2426" value="${v.modelo||''}"></div>
      <div><label>Ano</label><input id="f_ano" placeholder="2020" value="${v.ano||''}"></div>
      <div><label>Status</label><select id="f_status">${optSel(['Ativo','Manutenção','Inativo'],v.status)}</select></div>
      <div><label>KM atual</label><input type="number" id="f_km" placeholder="0" value="${v.km||''}"></div>
      <div><label>Próx. revisão (km)</label><input type="number" id="f_prox" placeholder="Ex: 290000" value="${v.proxRevisaoKm||''}"></div>
    </div>
    <div class="hint">A próxima revisão por km gera alerta automático quando faltar 2.000 km ou menos.</div>`,()=>{
      const obj={id:v.id||uid(),placa:val('f_placa').toUpperCase(),modelo:val('f_modelo'),tipo:val('f_tipo'),ano:val('f_ano'),km:numv('f_km'),status:val('f_status'),proxRevisaoKm:numv('f_prox')||''};
      if(!obj.placa||!obj.modelo){toast('Preencha placa e modelo','red');return;}
      upsert('veiculos',obj);closeModal();toast(id?'Veículo atualizado':'Veículo cadastrado');
    });
}
/* --- Manutenção --- */
function modalManutencao(id){
  const m=id?DB.manutencoes.find(x=>x.id===id):{tipo:'Preventiva',data:todayISO(),status:'Agendada'};
  openModal(id?'Editar manutenção':'Nova manutenção',`
    <div class="form-grid">
      <div><label>Veículo</label><select id="f_veic">${optVeic(m.veiculo)}</select></div>
      <div><label>Tipo</label><select id="f_tipo">${optSel(['Preventiva','Corretiva'],m.tipo)}</select></div>
      <div class="full"><label>Descrição do serviço</label><input id="f_desc" placeholder="Ex: Troca de óleo + filtros" value="${m.desc||''}"></div>
      <div><label>Data</label><input type="date" id="f_data" value="${m.data||todayISO()}"></div>
      <div><label>KM</label><input type="number" id="f_km" placeholder="0" value="${m.km||''}"></div>
      <div><label>Custo (R$)</label><input type="number" step="0.01" id="f_custo" placeholder="0,00" value="${m.custo||''}"></div>
      <div><label>Status</label><select id="f_status">${optSel(['Agendada','Em andamento','Concluída'],m.status)}</select></div>
      <div class="full"><label>Próxima revisão (km) — opcional</label><input type="number" id="f_prox" placeholder="Atualiza o alerta do veículo" value="${m.proxKm||''}"></div>
    </div>`,()=>{
      const obj={id:m.id||uid(),veiculo:val('f_veic'),tipo:val('f_tipo'),desc:val('f_desc'),data:val('f_data'),km:numv('f_km'),custo:numv('f_custo'),status:val('f_status'),proxKm:numv('f_prox')||''};
      if(!obj.desc){toast('Descreva o serviço','red');return;}
      upsert('manutencoes',obj);
      // atualiza km e próxima revisão do veículo
      const v=veiculoById(obj.veiculo);
      if(v){ if(obj.km>v.km) v.km=obj.km; if(obj.proxKm) v.proxRevisaoKm=obj.proxKm; }
      save();closeModal();toast(id?'Manutenção atualizada':'Manutenção registrada');refreshAll();
    });
}

}
/* --- Motorista --- */
function modalMotorista(id){
  const m=id?DB.motoristas.find(x=>x.id===id):{cat:'E',status:'Ativo',admissao:todayISO()};
  openModal(id?'Editar motorista':'Novo motorista',`
    <div class="form-grid">
      <div class="full"><label>Nome completo</label><input id="f_nome" placeholder="Nome do motorista" value="${m.nome||''}"></div>
      <div><label>Nº da CNH</label><input id="f_cnh" placeholder="00000000000" value="${m.cnh||''}"></div>
      <div><label>Categoria</label><select id="f_cat">${optSel(['B','C','D','E'],m.cat)}</select></div>
      <div><label>Validade da CNH</label><input type="date" id="f_val" value="${m.validade||''}"></div>
      <div><label>Telefone</label><input id="f_tel" placeholder="(98) 90000-0000" value="${m.tel||''}"></div>
      <div><label>Admissão</label><input type="date" id="f_adm" value="${m.admissao||todayISO()}"></div>
      <div><label>Status</label><select id="f_status">${optSel(['Ativo','Folga','Afastado','Inativo'],m.status)}</select></div>
    </div>
    <div class="hint">CNH com vencimento em até 30 dias entra automaticamente nos alertas do painel.</div>`,()=>{
      const obj={id:m.id||uid(),nome:val('f_nome'),cnh:val('f_cnh'),cat:val('f_cat'),validade:val('f_val'),tel:val('f_tel'),admissao:val('f_adm'),status:val('f_status')};
      if(!obj.nome){toast('Informe o nome','red');return;}
      upsert('motoristas',obj);closeModal();toast(id?'Motorista atualizado':'Motorista cadastrado');
    });
}

/* ===================================================================
   CRUD + NAV + UTIL
=================================================================== */
function upsert(coll,obj){
  const i=DB[coll].findIndex(x=>x.id===obj.id);
  if(i>=0)DB[coll][i]=obj;else DB[coll].push(obj);
  save();refreshAll();
}
function del(coll,id){
  if(!confirm('Excluir este registro? Esta ação não pode ser desfeita.'))return;
  DB[coll]=DB[coll].filter(x=>x.id!==id);
  save();refreshAll();toast('Registro excluído','amber');
}

function refreshAll(){
  renderDashboard();renderEscalas();renderFrota();renderCombustivel();renderEquipe();updateBadges();
}
function updateBadges(){
  const bf=document.getElementById('badge-frota'),be=document.getElementById('badge-equipe');
  const cf=countAlertasFrota(),ce=countAlertasEquipe();
  bf.style.display=cf?'grid':'none';bf.textContent=cf;
  be.style.display=ce?'grid':'none';be.textContent=ce;
}

function go(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+page));
  document.getElementById('pageTitle').textContent=PAGES[page].title;
  document.getElementById('pageSub').textContent=PAGES[page].sub;
  document.getElementById('sidebar').classList.remove('open');
  const labels={dashboard:'Novo lançamento',escalas:'Nova escala',frota:'Novo registro',combustivel:'Novo lançamento',equipe:'Novo motorista'};
  document.getElementById('mainAddLabel').textContent=labels[page]||'Novo';
  window.scrollTo({top:0,behavior:'smooth'});
}
function openMainAdd(){
  ({dashboard:()=>modalAbastecimento(),escalas:()=>modalEscala(),frota:()=>fFrotaTab==='veiculos'?modalVeiculo():modalManutencao(),combustivel:()=>fCombTab==='abastecimentos'?modalAbastecimento():modalCusto(),equipe:()=>modalMotorista()}[currentPage]||(()=>{}))();
}

function toast(msg,type='green'){
  const colors={green:'var(--green)',red:'var(--red)',amber:'var(--amber)'};
  const w=document.getElementById('toastWrap');
  const t=document.createElement('div');t.className='toast';t.style.borderLeftColor=colors[type];
  t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="${colors[type]}" stroke-width="2.2"><path d="M20 6 9 17l-5-5"/></svg>${msg}`;
  w.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px)';t.style.transition='.3s';setTimeout(()=>t.remove(),300);},2600);
}

/* backup / restore */
function exportData(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`rotaflow-backup-${todayISO()}.json`;a.click();toast('Backup gerado');
}
function importData(){document.getElementById('importFile').click();}
document.getElementById('importFile').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{DB=JSON.parse(ev.target.result);save();refreshAll();toast('Backup restaurado');}catch(err){toast('Arquivo inválido','red');}};
  r.readAsText(f);e.target.value='';
});

/* nav binding */
document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>go(n.dataset.page)));
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* init */
document.getElementById('company-name').textContent=DB.company||'SLZ Cargas';
refreshAll();go('dashboard');
</script>
</body>
</html>
